<!DOCTYPE html>
<html>
<head>
  <title>Site Blocked</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f1f3f4; }
    .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 420px; width: 100%; }
    h1 { color: #d93025; margin-top: 0; }
    #blocked-url { font-weight: bold; font-size: 0.95em; color: #333; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 4px; word-wrap: break-word; }
    button { padding: 12px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: background 0.2s; margin-bottom: 10px; }
    #whitelist-domain-btn { background: #0052cc; }
    #whitelist-domain-btn:hover { background: #0043a6; }
    #whitelist-page-btn { background: #1967d2; }
    #whitelist-page-btn:hover { background: #1557b0; }
    #safesearch-btn { background: #1a73e8; margin-bottom: 0; }
    #safesearch-btn:hover { background: #1557b0; }
    .hint { font-size: 0.85em; color: #666; margin: 0 0 16px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; padding: 24px; border-radius: 8px; width: 90%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); text-align: left; }
    .modal h3 { margin: 0 0 8px; font-size: 1.1em; }
    .modal p { margin: 0 0 14px; color: #555; font-size: 0.9em; }
    .modal input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; font-size: 1em; }
    .modal-error { color: #d93025; font-size: 0.85em; margin: -6px 0 10px; display: none; }
    .modal-error.visible { display: block; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-actions button { margin: 0; flex: 1; }
    .modal-cancel { background: #e8eaed; color: #333; }
    .modal-cancel:hover { background: #dadce0; }
    .modal-confirm { background: #0052cc; }
    .modal-confirm:hover { background: #0043a6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>FocusLock</h1>
    <p>This page is not on your whitelist:</p>
    <div id="blocked-url">Loading...</div>
    <p class="hint">Choose to allow the whole site or only this specific page.</p>
    <button id="whitelist-domain-btn">Whitelist Whole Domain</button>
    <button id="whitelist-page-btn">Whitelist This Page Only</button>
    <button id="safesearch-btn">Enable Safe Search Mode</button>
  </div>

  <div id="password-modal" class="modal-overlay">
    <div class="modal">
      <h3 id="password-modal-title">Enter Password</h3>
      <p id="password-modal-desc"></p>
      <input type="password" id="modal-password" placeholder="Password" autocomplete="current-password">
      <p id="password-modal-error" class="modal-error">Incorrect password.</p>
      <div class="modal-actions">
        <button type="button" class="modal-cancel" id="password-modal-cancel">Cancel</button>
        <button type="button" class="modal-confirm" id="password-modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <div id="safesearch-modal" class="modal-overlay">
    <div class="modal">
      <h3>Enable Safe Search</h3>
      <p>Temporarily unblock the web in text-only mode (no images/videos). Enter password and duration.</p>
      <input type="password" id="safesearch-password" placeholder="Password" autocomplete="current-password">
      <input type="text" id="safesearch-duration" placeholder="e.g. 5 minutes, 10 mins, 1 hour">
      <p id="safesearch-modal-error" class="modal-error"></p>
      <div class="modal-actions">
        <button type="button" class="modal-cancel" id="safesearch-modal-cancel">Cancel</button>
        <button type="button" class="modal-confirm" id="safesearch-modal-confirm">Enable</button>
      </div>
    </div>
  </div>

  <script src="whitelist-utils.js"></script>
  <script src="secure-storage.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
