<!DOCTYPE html>
<html>
<head>
  <title>Site Blocked</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f1f3f4; }
    .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    h1 { color: #d93025; margin-top: 0; }
    #domain-name { font-weight: bold; font-size: 1.2em; color: #333; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 4px; word-wrap: break-word; }
    button { padding: 12px 20px; background: #0052cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: background 0.2s; }
    button:hover { background: #0043a6; }
  </style>
</head>
<body>
  <div class="container">
    <h1>FocusLock</h1>
    <p>This website is not on your whitelist:</p>
    <div id="domain-name">Loading...</div>
    <button id="unlock-btn">Whitelist This Site</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
