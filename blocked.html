<!doctype html>
<html>
  <head>
    <title>Site Blocked</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f1f3f4;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }
      h1 {
        color: #d93025;
        margin-top: 0;
      }
      #domain-name {
        font-weight: bold;
        font-size: 1.2em;
        color: #333;
        margin: 20px 0;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 4px;
        word-wrap: break-word;
      }
      button {
        padding: 12px 20px;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1em;
        width: 100%;
        transition: background 0.2s;
        margin-bottom: 10px;
      }
      #allow-domain-btn {
        background: #0052cc;
      }
      #allow-domain-btn:hover {
        background: #0043a6;
      }
      #allow-page-btn {
        background: #00875a;
      }
      #allow-page-btn:hover {
        background: #006644;
      }
      #safesearch-btn {
        background: #1a73e8;
        margin-bottom: 0;
      }
      #safesearch-btn:hover {
        background: #1557b0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>FocusLock</h1>
      <p id="message">This website is not on your whitelist:</p>
      <div id="domain-name">Loading...</div>

      <button id="allow-domain-btn">Add Website to Whitelist</button>
      <button id="allow-page-btn" style="display: none">
        Allow This Specific Page
      </button>
      <button id="safesearch-btn">Enable Safe Search Mode</button>
    </div>
    <script src="whitelist-utils.js"></script>
    <script src="secure-storage.js"></script>
    <script src="blocked.js"></script>
  </body>
</html>
